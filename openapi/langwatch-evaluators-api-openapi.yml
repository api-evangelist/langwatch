      operationId: getApiEvaluatorsByIdOrSlug
      parameters:
      - schema:
          type: string
        in: path
        name: idOrSlug
        required: true
      description: Get a specific evaluator by ID or slug
      tags:
      - Evaluators
  /api/evaluators/{id}:
    put:
