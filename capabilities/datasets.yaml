naftiko: 1.0.0-alpha2
info:
  label: LangWatch Datasets API
  description: 'Manage evaluation/fine-tuning datasets and their records. Self-contained Naftiko capability covering one LangWatch business surface.'
  tags:
  - LangWatch
  - Datasets
  - Records
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LANGWATCH_API_KEY: LANGWATCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: datasets
    baseUri: https://app.langwatch.ai
    description: Manage evaluation/fine-tuning datasets and their records.
    resources:
    - name: api-dataset
      path: /api/dataset
      operations:
      - name: listDatasets
        method: GET
        description: List datasets.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createDataset
        method: POST
        description: Create a dataset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-dataset-upload
      path: /api/dataset/upload
      operations:
      - name: uploadDataset
        method: POST
        description: Upload a CSV dataset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-dataset-slugorid
      path: /api/dataset/{slugOrId}
      operations:
      - name: getDataset
        method: GET
        description: Get a dataset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slugOrId
          in: path
          type: string
          required: true
      - name: updateDataset
        method: PATCH
        description: Update a dataset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slugOrId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteDataset
        method: DELETE
        description: Delete a dataset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slugOrId
          in: path
          type: string
          required: true
    - name: api-dataset-slugorid-records
      path: /api/dataset/{slugOrId}/records
      operations:
      - name: listRecords
        method: GET
        description: List dataset records.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slugOrId
          in: path
          type: string
          required: true
      - name: createRecords
        method: POST
        description: Create dataset records.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slugOrId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteRecords
        method: DELETE
        description: Delete dataset records.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slugOrId
          in: path
          type: string
          required: true
    - name: api-dataset-slugorid-records-recordid
      path: /api/dataset/{slugOrId}/records/{recordId}
      operations:
      - name: updateRecord
        method: PATCH
        description: Update a dataset record.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slugOrId
          in: path
          type: string
          required: true
        - name: recordId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-dataset-slugorid-upload
      path: /api/dataset/{slugOrId}/upload
      operations:
      - name: uploadIntoDataset
        method: POST
        description: Upload rows into a dataset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slugOrId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-dataset-slug-entries
      path: /api/dataset/{slug}/entries
      operations:
      - name: appendEntries
        method: POST
        description: Append entries to a dataset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      value: '{{env.LANGWATCH_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: datasets-rest
    port: 8080
    description: REST adapter for LangWatch Datasets API.
    resources:
    - path: /v1/api/dataset
      name: listdatasets-resource
      description: REST surface for listDatasets.
      operations:
      - method: GET
        name: listDatasets
        description: List datasets.
        call: datasets.listDatasets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dataset
      name: createdataset-resource
      description: REST surface for createDataset.
      operations:
      - method: POST
        name: createDataset
        description: Create a dataset.
        call: datasets.createDataset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dataset/upload
      name: uploaddataset-resource
      description: REST surface for uploadDataset.
      operations:
      - method: POST
        name: uploadDataset
        description: Upload a CSV dataset.
        call: datasets.uploadDataset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dataset/{slugOrId}
      name: getdataset-resource
      description: REST surface for getDataset.
      operations:
      - method: GET
        name: getDataset
        description: Get a dataset.
        call: datasets.getDataset
        with:
          slugOrId: rest.path.slugOrId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dataset/{slugOrId}
      name: updatedataset-resource
      description: REST surface for updateDataset.
      operations:
      - method: PATCH
        name: updateDataset
        description: Update a dataset.
        call: datasets.updateDataset
        with:
          slugOrId: rest.path.slugOrId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dataset/{slugOrId}
      name: deletedataset-resource
      description: REST surface for deleteDataset.
      operations:
      - method: DELETE
        name: deleteDataset
        description: Delete a dataset.
        call: datasets.deleteDataset
        with:
          slugOrId: rest.path.slugOrId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dataset/{slugOrId}/records
      name: listrecords-resource
      description: REST surface for listRecords.
      operations:
      - method: GET
        name: listRecords
        description: List dataset records.
        call: datasets.listRecords
        with:
          slugOrId: rest.path.slugOrId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dataset/{slugOrId}/records
      name: createrecords-resource
      description: REST surface for createRecords.
      operations:
      - method: POST
        name: createRecords
        description: Create dataset records.
        call: datasets.createRecords
        with:
          slugOrId: rest.path.slugOrId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dataset/{slugOrId}/records
      name: deleterecords-resource
      description: REST surface for deleteRecords.
      operations:
      - method: DELETE
        name: deleteRecords
        description: Delete dataset records.
        call: datasets.deleteRecords
        with:
          slugOrId: rest.path.slugOrId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dataset/{slugOrId}/records/{recordId}
      name: updaterecord-resource
      description: REST surface for updateRecord.
      operations:
      - method: PATCH
        name: updateRecord
        description: Update a dataset record.
        call: datasets.updateRecord
        with:
          slugOrId: rest.path.slugOrId
          recordId: rest.path.recordId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dataset/{slugOrId}/upload
      name: uploadintodataset-resource
      description: REST surface for uploadIntoDataset.
      operations:
      - method: POST
        name: uploadIntoDataset
        description: Upload rows into a dataset.
        call: datasets.uploadIntoDataset
        with:
          slugOrId: rest.path.slugOrId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/dataset/{slug}/entries
      name: appendentries-resource
      description: REST surface for appendEntries.
      operations:
      - method: POST
        name: appendEntries
        description: Append entries to a dataset.
        call: datasets.appendEntries
        with:
          slug: rest.path.slug
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datasets-mcp
    port: 9090
    transport: http
    description: MCP adapter for LangWatch Datasets API. One tool per consumed operation.
    tools:
    - name: langwatch-listDatasets
      description: List datasets.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datasets.listDatasets
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-createDataset
      description: Create a dataset.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datasets.createDataset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-uploadDataset
      description: Upload a CSV dataset.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datasets.uploadDataset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-getDataset
      description: Get a dataset.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datasets.getDataset
      with:
        slugOrId: tools.slugOrId
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-updateDataset
      description: Update a dataset.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datasets.updateDataset
      with:
        slugOrId: tools.slugOrId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-deleteDataset
      description: Delete a dataset.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: datasets.deleteDataset
      with:
        slugOrId: tools.slugOrId
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-listRecords
      description: List dataset records.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datasets.listRecords
      with:
        slugOrId: tools.slugOrId
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-createRecords
      description: Create dataset records.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datasets.createRecords
      with:
        slugOrId: tools.slugOrId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-deleteRecords
      description: Delete dataset records.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: datasets.deleteRecords
      with:
        slugOrId: tools.slugOrId
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-updateRecord
      description: Update a dataset record.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datasets.updateRecord
      with:
        slugOrId: tools.slugOrId
        recordId: tools.recordId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-uploadIntoDataset
      description: Upload rows into a dataset.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datasets.uploadIntoDataset
      with:
        slugOrId: tools.slugOrId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-appendEntries
      description: Append entries to a dataset.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datasets.appendEntries
      with:
        slug: tools.slug
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
