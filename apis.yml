      - type: OpenAPI
        url: openapi/langwatch-openapi.json
    description: >-
      Configure and manage scorer evaluators — RAG quality (RAGAS), safety (Azure Content Safety, OpenAI Moderation,
      PII), format validation, semantic similarity, language detection, and LLM-as-Judge variants — that grade traces
      and dataset records.
