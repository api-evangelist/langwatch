naftiko: 1.0.0-alpha2
info:
  label: LangWatch Secrets API
  description: 'Encrypted credential storage for evaluator and integration secrets. Self-contained Naftiko capability covering one LangWatch business surface.'
  tags:
  - LangWatch
  - Secrets
  - Vault
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LANGWATCH_API_KEY: LANGWATCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: secrets
    baseUri: https://app.langwatch.ai
    description: Encrypted credential storage for evaluator and integration secrets.
    resources:
    - name: api-secrets
      path: /api/secrets
      operations:
      - name: listSecrets
        method: GET
        description: List secrets.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createSecret
        method: POST
        description: Create a secret.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-secrets-id
      path: /api/secrets/{id}
      operations:
      - name: deleteSecret
        method: DELETE
        description: Delete a secret.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.LANGWATCH_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: secrets-rest
    port: 8080
    description: REST adapter for LangWatch Secrets API.
    resources:
    - path: /v1/api/secrets
      name: listsecrets-resource
      description: REST surface for listSecrets.
      operations:
      - method: GET
        name: listSecrets
        description: List secrets.
        call: secrets.listSecrets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/secrets
      name: createsecret-resource
      description: REST surface for createSecret.
      operations:
      - method: POST
        name: createSecret
        description: Create a secret.
        call: secrets.createSecret
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/secrets/{id}
      name: deletesecret-resource
      description: REST surface for deleteSecret.
      operations:
      - method: DELETE
        name: deleteSecret
        description: Delete a secret.
        call: secrets.deleteSecret
        with:
          id: rest.path.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: secrets-mcp
    port: 9090
    transport: http
    description: MCP adapter for LangWatch Secrets API. One tool per consumed operation.
    tools:
    - name: langwatch-listSecrets
      description: List secrets.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: secrets.listSecrets
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-createSecret
      description: Create a secret.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: secrets.createSecret
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-deleteSecret
      description: Delete a secret.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: secrets.deleteSecret
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
