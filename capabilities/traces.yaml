naftiko: 1.0.0-alpha2
info:
  label: LangWatch Traces API
  description: 'Search, retrieve, and share LLM application traces ingested via OpenTelemetry. Self-contained Naftiko capability covering one LangWatch business surface.'
  tags:
  - LangWatch
  - Traces
  - Observability
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LANGWATCH_API_KEY: LANGWATCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: traces
    baseUri: https://app.langwatch.ai
    description: Search, retrieve, and share LLM application traces ingested via OpenTelemetry.
    resources:
    - name: api-traces-search
      path: /api/traces/search
      operations:
      - name: searchTraces
        method: POST
        description: Search traces with filters and pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-traces-traceid
      path: /api/traces/{traceId}
      operations:
      - name: getTrace
        method: GET
        description: Retrieve a single trace by id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: traceId
          in: path
          type: string
          required: true
    - name: api-trace-search
      path: /api/trace/search
      operations:
      - name: searchTracesLegacy
        method: POST
        description: Legacy trace search endpoint.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-trace-id
      path: /api/trace/{id}
      operations:
      - name: getTraceLegacy
        method: GET
        description: Legacy single-trace endpoint.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    - name: api-trace-id-share
      path: /api/trace/{id}/share
      operations:
      - name: shareTrace
        method: POST
        description: Create a public share link for a trace.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-trace-id-unshare
      path: /api/trace/{id}/unshare
      operations:
      - name: unshareTrace
        method: POST
        description: Revoke a trace''s public share link.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      value: '{{env.LANGWATCH_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: traces-rest
    port: 8080
    description: REST adapter for LangWatch Traces API.
    resources:
    - path: /v1/api/traces/search
      name: searchtraces-resource
      description: REST surface for searchTraces.
      operations:
      - method: POST
        name: searchTraces
        description: Search traces with filters and pagination.
        call: traces.searchTraces
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/traces/{traceId}
      name: gettrace-resource
      description: REST surface for getTrace.
      operations:
      - method: GET
        name: getTrace
        description: Retrieve a single trace by id.
        call: traces.getTrace
        with:
          traceId: rest.path.traceId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/trace/search
      name: searchtraceslegacy-resource
      description: REST surface for searchTracesLegacy.
      operations:
      - method: POST
        name: searchTracesLegacy
        description: Legacy trace search endpoint.
        call: traces.searchTracesLegacy
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/trace/{id}
      name: gettracelegacy-resource
      description: REST surface for getTraceLegacy.
      operations:
      - method: GET
        name: getTraceLegacy
        description: Legacy single-trace endpoint.
        call: traces.getTraceLegacy
        with:
          id: rest.path.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/trace/{id}/share
      name: sharetrace-resource
      description: REST surface for shareTrace.
      operations:
      - method: POST
        name: shareTrace
        description: Create a public share link for a trace.
        call: traces.shareTrace
        with:
          id: rest.path.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/trace/{id}/unshare
      name: unsharetrace-resource
      description: REST surface for unshareTrace.
      operations:
      - method: POST
        name: unshareTrace
        description: Revoke a trace''s public share link.
        call: traces.unshareTrace
        with:
          id: rest.path.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: traces-mcp
    port: 9090
    transport: http
    description: MCP adapter for LangWatch Traces API. One tool per consumed operation.
    tools:
    - name: langwatch-searchTraces
      description: Search traces with filters and pagination.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: traces.searchTraces
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-getTrace
      description: Retrieve a single trace by id.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: traces.getTrace
      with:
        traceId: tools.traceId
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-searchTracesLegacy
      description: Legacy trace search endpoint.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: traces.searchTracesLegacy
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-getTraceLegacy
      description: Legacy single-trace endpoint.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: traces.getTraceLegacy
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-shareTrace
      description: Create a public share link for a trace.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: traces.shareTrace
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-unshareTrace
      description: Revoke a trace''s public share link.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: traces.unshareTrace
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
