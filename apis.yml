apis:
  - aid: langwatch:langwatch-traces-api
    name: LangWatch Traces API
    tags:
      - Traces
      - Observability
      - OpenTelemetry
    humanURL: https://langwatch.ai/docs/api-reference/traces
    properties:
      - type: Documentation
        url: https://langwatch.ai/docs/api-reference/traces
      - type: OpenAPI
        url: openapi/langwatch-openapi.json
    description: >-
      Search, retrieve, share, and unshare traces produced by instrumented LLM applications. Traces are the foundational
      observability primitive in LangWatch and arrive via OTLP/OpenTelemetry from Python or TypeScript SDKs (or any
      OTel-compliant client). Endpoints include /api/traces/search, /api/traces/{traceId}, /api/trace/{id}/share, and
      /api/trace/{id}/unshare.
