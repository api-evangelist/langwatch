naftiko: 1.0.0-alpha2
info:
  label: LangWatch Triggers API
  description: 'Event-driven triggers that fire on trace conditions and monitor scores. Self-contained Naftiko capability covering one LangWatch business surface.'
  tags:
  - LangWatch
  - Triggers
  - Automation
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LANGWATCH_API_KEY: LANGWATCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: triggers
    baseUri: https://app.langwatch.ai
    description: Event-driven triggers that fire on trace conditions and monitor scores.
    resources:
    - name: api-triggers
      path: /api/triggers
      operations:
      - name: listTriggers
        method: GET
        description: List triggers.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createTrigger
        method: POST
        description: Create a trigger.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-triggers-id
      path: /api/triggers/{id}
      operations:
      - name: getTrigger
        method: GET
        description: Retrieve a trigger.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: updateTrigger
        method: PATCH
        description: Update a trigger.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteTrigger
        method: DELETE
        description: Delete a trigger.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.LANGWATCH_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: triggers-rest
    port: 8080
    description: REST adapter for LangWatch Triggers API.
    resources:
    - path: /v1/api/triggers
      name: listtriggers-resource
      description: REST surface for listTriggers.
      operations:
      - method: GET
        name: listTriggers
        description: List triggers.
        call: triggers.listTriggers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/triggers
      name: createtrigger-resource
      description: REST surface for createTrigger.
      operations:
      - method: POST
        name: createTrigger
        description: Create a trigger.
        call: triggers.createTrigger
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/triggers/{id}
      name: gettrigger-resource
      description: REST surface for getTrigger.
      operations:
      - method: GET
        name: getTrigger
        description: Retrieve a trigger.
        call: triggers.getTrigger
        with:
          id: rest.path.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/triggers/{id}
      name: updatetrigger-resource
      description: REST surface for updateTrigger.
      operations:
      - method: PATCH
        name: updateTrigger
        description: Update a trigger.
        call: triggers.updateTrigger
        with:
          id: rest.path.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/triggers/{id}
      name: deletetrigger-resource
      description: REST surface for deleteTrigger.
      operations:
      - method: DELETE
        name: deleteTrigger
        description: Delete a trigger.
        call: triggers.deleteTrigger
        with:
          id: rest.path.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: triggers-mcp
    port: 9090
    transport: http
    description: MCP adapter for LangWatch Triggers API. One tool per consumed operation.
    tools:
    - name: langwatch-listTriggers
      description: List triggers.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: triggers.listTriggers
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-createTrigger
      description: Create a trigger.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: triggers.createTrigger
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-getTrigger
      description: Retrieve a trigger.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: triggers.getTrigger
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-updateTrigger
      description: Update a trigger.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: triggers.updateTrigger
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-deleteTrigger
      description: Delete a trigger.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: triggers.deleteTrigger
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
