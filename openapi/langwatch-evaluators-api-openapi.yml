      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                config:
                  type: object
                  additionalProperties: {}
              required:
              - name
              - config
      tags:
      - Evaluators
  /api/evaluators/{idOrSlug}:
    get:
      responses:
        '200':
          description: Success
          content:
