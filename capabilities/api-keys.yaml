naftiko: 1.0.0-alpha2
info:
  label: LangWatch API Keys API
  description: 'Create, list, and revoke project API keys used by SDKs and automation. Self-contained Naftiko capability covering one LangWatch business surface.'
  tags:
  - LangWatch
  - API Keys
  - Authentication
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LANGWATCH_API_KEY: LANGWATCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: api-keys
    baseUri: https://app.langwatch.ai
    description: Create, list, and revoke project API keys used by SDKs and automation.
    resources:
    - name: api-api-keys
      path: /api/api-keys
      operations:
      - name: listApiKeys
        method: GET
        description: List API keys.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createApiKey
        method: POST
        description: Create an API key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-api-keys-id
      path: /api/api-keys/{id}
      operations:
      - name: revokeApiKey
        method: DELETE
        description: Revoke an API key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.LANGWATCH_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: api-keys-rest
    port: 8080
    description: REST adapter for LangWatch API Keys API.
    resources:
    - path: /v1/api/api-keys
      name: listapikeys-resource
      description: REST surface for listApiKeys.
      operations:
      - method: GET
        name: listApiKeys
        description: List API keys.
        call: api-keys.listApiKeys
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/api-keys
      name: createapikey-resource
      description: REST surface for createApiKey.
      operations:
      - method: POST
        name: createApiKey
        description: Create an API key.
        call: api-keys.createApiKey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/api-keys/{id}
      name: revokeapikey-resource
      description: REST surface for revokeApiKey.
      operations:
      - method: DELETE
        name: revokeApiKey
        description: Revoke an API key.
        call: api-keys.revokeApiKey
        with:
          id: rest.path.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for LangWatch API Keys API. One tool per consumed operation.
    tools:
    - name: langwatch-listApiKeys
      description: List API keys.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-keys.listApiKeys
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-createApiKey
      description: Create an API key.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: api-keys.createApiKey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: langwatch-revokeApiKey
      description: Revoke an API key.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: api-keys.revokeApiKey
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
