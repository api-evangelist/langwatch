  - type: Features
    data:
      - OpenTelemetry-native trace ingestion via Python and TypeScript SDKs and any OTel-compliant client
      - >-
        Built-in evaluators — RAGAS, Azure Content Safety, OpenAI Moderation, PII, semantic similarity, language
        detection, LLM-as-Judge
      - Real-time online monitors that score production traces against configured evaluators
      - Batch experiments, suites, and DSPy-driven optimization workflows
      - Prompt versioning with feature-flag-style deployment and `prompts/sync`/`restore`
      - Multi-turn agent simulations with User Simulator and Judge Agents (open-source `scenario` framework)
      - Collaborative annotation and labeling for domain experts and PMs
      - Datasets — CSV upload, programmatic CRUD, trace-to-record conversion
      - AI Gateway with OpenAI/Anthropic-compatible proxy, virtual keys, budgets, and semantic cache rules
      - Open-source Apache-2.0 core, MIT-licensed SDKs, commercial `ee/` enterprise modules
      - Self-hostable via Docker Compose, Helm, Kind, or full Kubernetes (PostgreSQL + Redis + ClickHouse + OpenSearch)
      - LangWatch Cloud with three plans — Developer (free), Growth (EUR 59 / core-seat / month), Enterprise (custom)
      - 14-day data retention on free tier, 30-day default on Growth, configurable on Enterprise
      - >-
        MCP server (`@langwatch/mcp-server`) exposing observability, prompts, datasets, scenarios, and evaluator tools
        to Claude / Cursor / other MCP clients
      - >-
        Integrations — OpenAI, Anthropic, Azure, AWS Bedrock, LiteLLM, LangChain, LangGraph, DSPy, OpenAI Agents,
        Pydantic AI, CrewAI, Autogen, Haystack
      - '`better-agents` standards repository for agent project scaffolding'
      - SOC 2 / ISO 27001 reports and forward-deployed engineering available under Enterprise tier
