aid: langwatch
name: LangWatch
description: >-
  LangWatch is an open-source LLM observability, evaluation, and AI agent testing platform. Built around
  OpenTelemetry-native tracing, LangWatch lets teams instrument LLM applications (LangChain, LangGraph, DSPy, OpenAI
  Agents, LiteLLM, Pydantic AI, CrewAI, AWS Bedrock, and more), run real-time and batch evaluations, version and deploy
  prompts, simulate multi-turn agent conversations against scripted scenarios and Judge Agents, manage labeled datasets,
  and govern model traffic through a virtual-key AI Gateway with budgets and semantic caching. The platform exposes a
  REST API at app.langwatch.ai, ships Python and TypeScript SDKs plus an MCP server, publishes the companion `scenario`
  agent-testing framework and `better-agents` standards, and runs on Apache-2.0 core (with `ee/` enterprise modules
  under commercial license) — deployable as LangWatch Cloud or self-hosted via Docker Compose, Helm, Kind, or full
  Kubernetes.
type: contract
position: Consuming
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
